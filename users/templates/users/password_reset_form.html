{% extends 'base.html' %}
{% block title %}Reset Password | Nyondo Hardware{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-12 bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden text-xs">
    <div class="bg-slate-900 text-white p-6 border-b border-slate-800">
        <h3 class="text-sm font-black tracking-wider uppercase"><i class="fa-solid fa-key text-amber-500 mr-1"></i> Account Password Recovery</h3>
        <p class="text-[11px] text-slate-400 font-medium mt-1">Enter your registered email below to receive a secure token link.</p>
    </div>
    
    <form method="POST" class="p-6 space-y-4 font-medium text-slate-700">
        {% csrf_token %}
        <div>
            <label class="block text-[10px] font-bold uppercase text-slate-400 mb-1">Corporate Email Address</label>
            <input type="email" name="email" autocomplete="email" required class="w-full border border-slate-200 px-3 py-2 rounded-md focus:outline-none focus:border-slate-900 text-slate-900">
        </div>
        
        
        
        <div class="text-center pt-2 border-t border-slate-100">
            <a href="password_reset_done" class="text-slate-400 hover:text-slate-900 font-bold uppercase tracking-wide text-[10px]">Back to System Sign In</a>
        </div>
    </form>
</div>
{% endblock %}
