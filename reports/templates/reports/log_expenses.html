{% extends 'base.html' %}

{% block title %}Log Business Expense | Nyondo Hardware{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto my-10">
    <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-8">
        <h2 class="text-sm font-black text-slate-900 uppercase tracking-wider mb-6">
            Log New Business Expense
        </h2>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase">{{ field.label }}</label>
                    <!-- I added 'form-control' or classes here to ensure they are clickable -->
                    <div class="w-full">
                        {{ field }}
                    </div>
                    {% if field.errors %}
                        <p class="text-xs text-red-500">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            
            <button type="submit" class="w-full bg-slate-900 text-white py-3 rounded-lg font-black uppercase text-[11px] hover:bg-rose-700 transition-colors mt-4">
                Confirm & Log Expense
            </button>
        </form>
    </div>
</div>
{% endblock %}
